global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'placementiq-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Monitor the Redis cache instance
  - job_name: 'redis_exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
